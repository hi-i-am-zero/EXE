<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bài viết — AutoWork Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/demo.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('auth');
    renderAppLayout('/app/posts.html');
    setPageTitle('Bài viết', `<button class="btn-primary btn-sm" onclick="showPostForm()"><i class="bi bi-plus"></i> Tạo bài</button>`);

    let currentPage = 1;
    let posts = [];
    let filterStatusVal = null;

    async function loadPosts() {
      setPageContent('<div class="empty-state">Đang tải...</div>');
      try {
        const statusQ = filterStatusVal !== null ? `&status=${filterStatusVal}` : '';
        const json = await apiGet(`/api/Posts?page=${currentPage}&pageSize=10${statusQ}`);
        if (!json.success) throw new Error(json.message);
        const result = json.data;
        posts = result.items || [];

        setPageContent(`
          <div class="action-bar">
            <button class="btn-outline btn-sm" onclick="filterStatus(null)">Tất cả</button>
            <button class="btn-outline btn-sm" onclick="filterStatus(0)">Nháp</button>
            <button class="btn-outline btn-sm" onclick="filterStatus(1)">Đã lên lịch</button>
            <button class="btn-outline btn-sm" onclick="filterStatus(2)">Đã đăng</button>
          </div>
          <div class="data-card">
            <table class="data-table">
              <thead><tr><th>Tiêu đề</th><th>Dự án</th><th>Trạng thái</th><th>Ngày tạo</th><th>Thao tác</th></tr></thead>
              <tbody>${posts.length ? posts.map(p => `<tr>
                <td><strong>${p.title || '—'}</strong></td>
                <td>${p.projectName || '—'}</td>
                <td><span class="badge ${postStatusClass(p.status)}">${postStatusLabel(p.status)}</span></td>
                <td>${formatDate(p.createdAt)}</td>
                <td style="white-space:nowrap">
                  <button class="btn-outline btn-icon btn-sm" onclick="viewPost('${p.id}')" title="Xem"><i class="bi bi-eye"></i></button>
                  <button class="btn-outline btn-icon btn-sm" onclick="editPost('${p.id}')" title="Sửa"><i class="bi bi-pencil"></i></button>
                  <button class="btn-success btn-icon btn-sm" onclick="publishPost('${p.id}')" title="Đăng"><i class="bi bi-send"></i></button>
                  <button class="btn-outline btn-icon btn-sm" onclick="schedulePost('${p.id}')" title="Lên lịch"><i class="bi bi-clock"></i></button>
                  <button class="btn-danger btn-icon btn-sm" onclick="deletePost('${p.id}')" title="Xóa"><i class="bi bi-trash"></i></button>
                </td></tr>`).join('') : '<tr><td colspan="5" class="empty-state">Chưa có bài — nhấn "Tạo bài" hoặc dùng AI Content</td></tr>'}
              </tbody>
            </table>
          </div>
          <div style="display:flex;justify-content:center;gap:12px;margin-top:20px">
            <button class="btn-outline btn-sm" id="prevPage" ${currentPage <= 1 ? 'disabled' : ''}>← Trước</button>
            <span style="line-height:32px;color:var(--color-text-muted)">Trang ${currentPage}</span>
            <button class="btn-outline btn-sm" id="nextPage" ${!result.hasNextPage ? 'disabled' : ''}>Sau →</button>
          </div>`);

        document.getElementById('prevPage')?.addEventListener('click', () => { currentPage--; loadPosts(); });
        document.getElementById('nextPage')?.addEventListener('click', () => { currentPage++; loadPosts(); });
      } catch (e) {
        setPageContent(`<div class="empty-state">Lỗi: ${e.message}</div>`);
      }
    }

    async function filterStatus(s) {
      filterStatusVal = s;
      currentPage = 1;
      loadPosts();
    }

    function showPostForm(edit = null) {
      showModal(edit ? 'Sửa bài viết' : 'Tạo bài viết', `
        <div class="form-group"><label>Tiêu đề</label><input id="pTitle" class="form-control" value="${edit?.title || ''}" /></div>
        <div class="form-group"><label>Nội dung</label><textarea id="pContent" class="form-control">${edit?.content || ''}</textarea></div>`,
        `<button class="btn-outline btn-sm" onclick="closeModal()">Hủy</button>
         <button class="btn-primary btn-sm" id="savePost">${edit ? 'Cập nhật' : 'Tạo'}</button>`);
      document.getElementById('savePost')?.addEventListener('click', async () => {
        const body = {
          projectId: DEMO.PROJECT_ID,
          channelAccountId: DEMO.CHANNEL_FB,
          title: document.getElementById('pTitle').value,
          content: document.getElementById('pContent').value,
          contentType: 1
        };
        const json = edit
          ? await apiPut(`/api/Posts/${edit.id}`, body)
          : await apiPost('/api/Posts', body);
        closeModal();
        if (json.success) {
          showToast(edit ? 'Đã cập nhật' : 'Đã tạo bài viết', 'success');
          DemoStore.addNotification('Bài viết', body.title, 'post');
          loadPosts();
        } else showToast(json.message, 'error');
      });
    }

    async function viewPost(id) {
      const json = await apiGet(`/api/Posts/${id}`);
      const p = json.data;
      showModal('Chi tiết bài viết', `
        <p><strong>${p?.title || '—'}</strong></p>
        <div class="ai-output">${p?.schedule ? 'Có lịch: ' + formatDate(p.schedule.scheduledAt) : 'Chưa lên lịch'}</div>`,
        `<button class="btn-outline btn-sm" onclick="closeModal()">Đóng</button>`);
    }

    async function editPost(id) {
      const json = await apiGet(`/api/Posts/${id}`);
      showPostForm({ id, title: json.data?.title, content: '' });
    }

    function publishPost(id) {
      confirmAction('Đăng bài lên Facebook ngay? (demo)', async () => {
        showToast('Demo: Đang đăng bài...', 'info');
        await new Promise(r => setTimeout(r, 1200));
        showToast('Đã đăng bài thành công!', 'success');
        DemoStore.addNotification('Đăng bài', 'Bài đã đăng lên Facebook', 'post');
      });
    }

    function schedulePost(id) {
      showModal('Lên lịch', `<input id="schAt" type="datetime-local" class="form-control" />`,
        `<button class="btn-primary btn-sm" id="doSch">Lên lịch</button>`);
      document.getElementById('doSch')?.addEventListener('click', async () => {
        const t = document.getElementById('schAt').value;
        const json = await apiPost('/api/Schedules', { postId: id, scheduledAt: new Date(t).toISOString(), recurrenceType: 0 });
        closeModal();
        if (json.success) { showToast('Đã lên lịch!', 'success'); loadPosts(); }
        else showToast(json.message, 'error');
      });
    }

    function deletePost(id) {
      confirmAction('Xóa bài viết này?', async () => {
        const json = await apiDelete(`/api/Posts/${id}`);
        if (json.success) { showToast('Đã xóa', 'success'); loadPosts(); }
      });
    }

    if (new URLSearchParams(location.search).get('action') === 'create') setTimeout(showPostForm, 500);
    loadPosts();
  </script>
</body>
</html>
