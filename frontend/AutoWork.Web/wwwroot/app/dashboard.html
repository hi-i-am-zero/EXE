<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Dashboard — AutoWork</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('auth');
    renderAppLayout('/app/dashboard.html');
    setPageTitle('Dashboard');

    (async () => {
      setPageContent('<div class="empty-state">Đang tải dữ liệu...</div>');

      try {
        const json = await apiGet('/api/dashboard/stats');
        if (!json.success) throw new Error(json.message);

        const s = json.data;
        setPageContent(`
          <div class="stats-grid">
            <div class="stat-card">
              <div class="stat-icon" style="background:#eef2ff;color:#6366f1"><i class="bi bi-file-post"></i></div>
              <div class="stat-label">Tổng bài viết</div>
              <div class="stat-value">${s.totalPosts}</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#d1fae5;color:#059669"><i class="bi bi-calendar-day"></i></div>
              <div class="stat-label">Bài hôm nay</div>
              <div class="stat-value">${s.postsToday}</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#fef3c7;color:#d97706"><i class="bi bi-robot"></i></div>
              <div class="stat-label">AI đã tạo</div>
              <div class="stat-value">${s.aiGenerations}</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#dbeafe;color:#2563eb"><i class="bi bi-coin"></i></div>
              <div class="stat-label">Credits còn lại</div>
              <div class="stat-value">${s.creditsRemaining}</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#fce7f3;color:#db2777"><i class="bi bi-folder"></i></div>
              <div class="stat-label">Dự án active</div>
              <div class="stat-value">${s.activeProjects}</div>
            </div>
            <div class="stat-card">
              <div class="stat-icon" style="background:#f3e8ff;color:#9333ea"><i class="bi bi-clock"></i></div>
              <div class="stat-label">Đã lên lịch</div>
              <div class="stat-value">${s.scheduledPosts}</div>
            </div>
          </div>
          <div class="charts-row">
            <div class="chart-card"><h3>Bài viết theo ngày</h3><canvas id="postsChart"></canvas></div>
            <div class="chart-card"><h3>Sử dụng AI</h3><canvas id="aiChart"></canvas></div>
          </div>
          <div class="data-card">
            <div style="padding:16px 20px;border-bottom:1px solid var(--color-border);font-weight:600">Hoạt động gần đây</div>
            <table class="data-table">
              <thead><tr><th>Hoạt động</th><th>Thời gian</th></tr></thead>
              <tbody id="activityBody"></tbody>
            </table>
          </div>`);

        const chartOpts = {
          responsive: true,
          plugins: { legend: { display: false } },
          scales: { y: { beginAtZero: true, ticks: { stepSize: 1 } } }
        };

        new Chart(document.getElementById('postsChart'), {
          type: 'line',
          data: {
            labels: (s.postsChart || []).map(c => c.label),
            datasets: [{ label: 'Bài viết', data: (s.postsChart || []).map(c => c.value), borderColor: '#6366f1', backgroundColor: 'rgba(99,102,241,.1)', fill: true, tension: .4 }]
          },
          options: chartOpts
        });

        new Chart(document.getElementById('aiChart'), {
          type: 'bar',
          data: {
            labels: (s.aiUsageChart || []).map(c => c.label),
            datasets: [{ label: 'AI', data: (s.aiUsageChart || []).map(c => c.value), backgroundColor: '#0ea5e9' }]
          },
          options: chartOpts
        });

        const activities = s.recentActivities || [];
        document.getElementById('activityBody').innerHTML = activities.length
          ? activities.map(a => `<tr><td>${a.description || a.action || '—'}</td><td>${formatDate(a.createdAt || a.timestamp)}</td></tr>`).join('')
          : '<tr><td colspan="2" class="empty-state">Chưa có hoạt động</td></tr>';
      } catch (e) {
        setPageContent(`<div class="empty-state">Không tải được dashboard. ${e.message || 'Kiểm tra API đang chạy.'}</div>`);
      }
    })();
  </script>
</body>
</html>
