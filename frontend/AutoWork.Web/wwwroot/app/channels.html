<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Kết nối kênh — AutoWork Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/demo.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('auth');
    renderAppLayout('/app/channels.html');
    setPageTitle('Kết nối kênh');

    const channels = [
      { key: 'facebook', name: 'Facebook Fanpage', icon: 'bi-facebook', cls: 'facebook',
        desc: 'Đăng bài, auto comment, nhận diện lead', apiConnect: '/api/facebook/connect' },
      { key: 'wordpress', name: 'WordPress / WooCommerce', icon: 'bi-wordpress', cls: 'wordpress',
        desc: 'Bài SEO, meta, link sản phẩm WooCommerce', apiConnect: null },
      { key: 'zalo', name: 'Zalo Official Account', icon: 'bi-chat-dots', cls: 'zalo',
        desc: 'Đăng tin OA, chăm sóc khách hàng', apiConnect: '/api/zalo/connect' }
    ];

    function render() {
      const connected = DemoStore.getChannels();
      setPageContent(`
        <div class="channel-grid">
          ${channels.map(c => `
            <div class="channel-card ${c.cls} ${connected[c.key] ? 'connected' : ''}">
              <div class="ch-icon"><i class="bi ${c.icon}"></i></div>
              <h3>${c.name}</h3>
              <p style="color:var(--color-text-muted);font-size:.9rem">${c.desc}</p>
              <p style="margin:16px 0">${renderChannelBadge(c.key, connected[c.key])}</p>
              <div class="action-bar" style="justify-content:center">
                ${connected[c.key]
                  ? `<button class="btn-outline btn-sm" onclick="disconnect('${c.key}')"><i class="bi bi-x-circle"></i> Ngắt kết nối</button>
                     <button class="btn-primary btn-sm" onclick="publishDemo('${c.key}')"><i class="bi bi-send"></i> Đăng thử</button>`
                  : `<button class="btn-primary btn-sm" onclick="connect('${c.key}')"><i class="bi bi-link-45deg"></i> Kết nối</button>`}
              </div>
            </div>`).join('')}
        </div>
        <div class="data-card" style="padding:20px;margin-top:24px">
          <h3 style="margin:0 0 12px"><i class="bi bi-lightning"></i> Auto Comment Fanpage</h3>
          <p style="color:var(--color-text-muted);font-size:.9rem">Demo trả lời comment tự động, ẩn comment nhạy cảm.</p>
          <button class="btn-outline btn-sm" onclick="showAutoComment()"><i class="bi bi-chat-quote"></i> Thử Auto Comment</button>
        </div>`);
    }

    function connect(key) {
      showModal(`Kết nối ${key}`, `
        <p style="text-align:center;padding:20px 0">
          <i class="bi bi-shield-lock" style="font-size:3rem;color:var(--color-primary)"></i><br><br>
          Mô phỏng OAuth — trong bản production sẽ redirect đến ${key}.
        </p>
        <div class="form-group"><label>Tên tài khoản demo</label>
          <input id="accName" class="form-control" value="Fanpage Shop Hương" /></div>`,
        `<button class="btn-outline btn-sm" onclick="closeModal()">Hủy</button>
         <button class="btn-primary btn-sm" id="doConnect">Kết nối ngay</button>`);
      document.getElementById('doConnect')?.addEventListener('click', async () => {
        DemoStore.connectChannel(key);
        closeModal();
        showToast(`Đã kết nối ${key}! (demo)`, 'success');
        DemoStore.addNotification('Kênh mới', `Đã kết nối ${key}`, 'system');
        render();
      });
    }

    function disconnect(key) {
      confirmAction(`Ngắt kết nối ${key}?`, () => {
        const ch = DemoStore.getChannels();
        ch[key] = false;
        DemoStore.set('channels', ch);
        showToast('Đã ngắt kết nối', 'info');
        render();
      });
    }

    async function publishDemo(key) {
      showToast(`Demo: Đang đăng bài lên ${key}...`, 'info');
      await new Promise(r => setTimeout(r, 1500));
      showToast(`Đã đăng bài lên ${key} thành công! (demo)`, 'success');
      DemoStore.addNotification('Đăng bài thành công', `Bài đã đăng lên ${key}`, 'post');
    }

    function showAutoComment() {
      showModal('Auto Comment Demo', `
        <div class="form-group"><label>Bình luận khách</label>
          <textarea id="cmt" class="form-control">Cho em xin giá bộ sương mù size M ạ?</textarea></div>
        <div id="cmtReply" class="ai-output demo" style="display:none;margin-top:12px"></div>`,
        `<button class="btn-primary btn-sm" id="genReply">Tạo phản hồi AI</button>`);
      document.getElementById('genReply')?.addEventListener('click', () => {
        const reply = mockAiContent('phản hồi khách hàng', 'zalo');
        document.getElementById('cmtReply').style.display = 'block';
        document.getElementById('cmtReply').textContent =
          '💬 Phản hồi gợi ý:\n\nDạ chào chị! Bộ sương mù size M giá 450K, đang giảm 20% còn 360K ạ. Chị inbox để shop giữ size nhé! 🛍️';
        showToast('AI đã tạo phản hồi comment', 'success');
      });
    }

    render();
  </script>
</body>
</html>
