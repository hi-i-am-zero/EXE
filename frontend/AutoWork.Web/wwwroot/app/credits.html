<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Credits — AutoWork Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/demo.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('auth');
    renderAppLayout('/app/credits.html');
    setPageTitle('Credits', `<button class="btn-primary btn-sm" onclick="buyCredits()"><i class="bi bi-cart-plus"></i> Mua thêm</button>`);

    async function load() {
      setPageContent('<div class="empty-state">Đang tải...</div>');
      try {
        const [creditJson, txJson] = await Promise.all([
          apiGet('/api/credits'),
          apiGet('/api/credits/transactions?page=1&pageSize=20')
        ]);
        const c = creditJson.data || {};
        const txs = txJson.data?.items || [];

        setPageContent(`
          <div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">
            <div class="stat-card"><div class="stat-label">Số dư</div><div class="stat-value" style="color:var(--color-primary)">${c.balance ?? 0}</div></div>
            <div class="stat-card"><div class="stat-label">Đã nhận</div><div class="stat-value">${c.totalEarned ?? 0}</div></div>
            <div class="stat-card"><div class="stat-label">Đã dùng</div><div class="stat-value">${c.totalUsed ?? 0}</div></div>
          </div>
          <div class="channel-grid" style="margin-bottom:24px">
            ${[{pts:500,price:99000},{pts:2000,price:299000},{pts:10000,price:999000}].map(p => `
              <div class="channel-card">
                <div style="font-size:2rem;font-weight:800;color:var(--color-primary)">${p.pts}</div>
                <div style="color:var(--color-text-muted)">credits</div>
                <div style="font-weight:700;margin:12px 0">${formatCurrency(p.price)}</div>
                <button class="btn-primary btn-sm" onclick="buyPack(${p.pts},${p.price})">Mua ngay</button>
              </div>`).join('')}
          </div>
          <div class="data-card">
            <div style="padding:16px 20px;border-bottom:1px solid var(--color-border);font-weight:600">Lịch sử</div>
            <table class="data-table"><thead><tr><th>Loại</th><th>Số lượng</th><th>Mô tả</th><th>Thời gian</th></tr></thead>
            <tbody>${txs.length ? txs.map(t => `<tr>
              <td><span class="badge ${t.amount >= 0 ? 'badge-success' : 'badge-danger'}">${t.type ?? (t.amount >= 0 ? '+' : '-')}</span></td>
              <td><strong>${t.amount >= 0 ? '+' : ''}${t.amount}</strong></td>
              <td>${t.description || '—'}</td><td>${formatDate(t.createdAt)}</td></tr>`).join('')
              : '<tr><td colspan="4" class="empty-state">Chưa có giao dịch</td></tr>'}
            </tbody></table>
          </div>`);
      } catch (e) {
        setPageContent(`<div class="empty-state">Lỗi: ${e.message}</div>`);
      }
    }

    function buyCredits() { buyPack(500, 99000); }

    function buyPack(pts, price) {
      showModal('Mua Credits', `
        <p>Gói <strong>${pts} credits</strong> — ${formatCurrency(price)}</p>
        <div class="action-bar" style="justify-content:center">
          <button class="btn-outline btn-sm" onclick="payDemo('MoMo')"><i class="bi bi-phone"></i> MoMo</button>
          <button class="btn-outline btn-sm" onclick="payDemo('VNPay')"><i class="bi bi-credit-card"></i> VNPay</button>
          <button class="btn-outline btn-sm" onclick="payDemo('ZaloPay')"><i class="bi bi-wallet2"></i> ZaloPay</button>
        </div>`,
        `<button class="btn-outline btn-sm" onclick="closeModal()">Hủy</button>`);
      window._buyPts = pts;
    }

    function payDemo(method) {
      closeModal();
      showToast(`Demo: Đang chuyển ${method}...`, 'info');
      setTimeout(() => {
        showToast(`Thanh toán ${method} thành công! +${window._buyPts} credits (demo)`, 'success');
        DemoStore.addNotification('Thanh toán', `+${window._buyPts} credits qua ${method}`, 'payment');
        load();
      }, 2000);
    }

    load();
  </script>
</body>
</html>
