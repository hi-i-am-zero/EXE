<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Media — AutoWork Demo</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <script src="/js/api.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/demo.js"></script>
  <script src="/js/layout.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('auth');
    renderAppLayout('/app/media.html');
    setPageTitle('Thư viện Media');

    let demoFiles = DemoStore.get('mediaFiles', []);

    function render() {
      setPageContent(`
        <div class="action-bar">
          <label class="btn-primary btn-sm" style="cursor:pointer">
            <i class="bi bi-cloud-upload"></i> Tải lên
            <input type="file" id="fileInput" accept="image/*" style="display:none" />
          </label>
          <button class="btn-outline btn-sm" onclick="addDemoImage()"><i class="bi bi-image"></i> Thêm ảnh demo</button>
        </div>
        <div class="channel-grid" id="mediaGrid">
          ${demoFiles.length ? demoFiles.map(f => `
            <div class="channel-card">
              <img src="${f.url}" alt="${f.name}" style="width:100%;height:140px;object-fit:cover;border-radius:8px;margin-bottom:12px" onerror="this.src='https://placehold.co/300x200/e2e8f0/64748b?text=Media'" />
              <div style="font-weight:600;font-size:.85rem">${f.name}</div>
              <div style="color:var(--color-text-muted);font-size:.75rem">${f.size || '—'}</div>
              <button class="btn-danger btn-sm" style="margin-top:10px" onclick="removeFile('${f.id}')"><i class="bi bi-trash"></i></button>
            </div>`).join('') : '<div class="empty-state" style="grid-column:1/-1">Chưa có file. Thử tải lên hoặc thêm ảnh demo.</div>'}
        </div>`);
      document.getElementById('fileInput')?.addEventListener('change', uploadFile);
    }

    async function uploadFile(e) {
      const file = e.target.files?.[0];
      if (!file) return;
      showToast('Đang tải lên...', 'info');
      try {
        await apiReady;
        const fd = new FormData();
        fd.append('file', file);
        const token = localStorage.getItem('accessToken');
        const res = await fetch(`${API_BASE}/api/Media/upload`, {
          method: 'POST',
          headers: token ? { Authorization: `Bearer ${token}` } : {},
          body: fd
        });
        const json = await res.json();
        if (json.success) showToast('Upload thành công!', 'success');
        else throw new Error(json.message);
      } catch (err) {
        showToast('Demo: Lưu file cục bộ', 'info');
      }
      const url = URL.createObjectURL(file);
      demoFiles.unshift({ id: crypto.randomUUID(), name: file.name, url, size: (file.size/1024).toFixed(1) + ' KB' });
      DemoStore.set('mediaFiles', demoFiles);
      DemoStore.addNotification('Media', `Đã tải ${file.name}`, 'system');
      render();
    }

    function addDemoImage() {
      demoFiles.unshift({
        id: crypto.randomUUID(),
        name: 'product-demo-' + (demoFiles.length + 1) + '.jpg',
        url: `https://placehold.co/400x300/6366f1/ffffff?text=AutoWork+Demo+${demoFiles.length + 1}`,
        size: '128 KB'
      });
      DemoStore.set('mediaFiles', demoFiles);
      showToast('Đã thêm ảnh demo', 'success');
      render();
    }

    function removeFile(id) {
      demoFiles = demoFiles.filter(f => f.id !== id);
      DemoStore.set('mediaFiles', demoFiles);
      render();
    }

    render();
  </script>
</body>
</html>
